name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            pkg-target: node20-macos-arm64
            sidecar-name: backend-server-aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            pkg-target: node20-win-x64
            sidecar-name: backend-server-x86_64-pc-windows-msvc.exe
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend-desktop dependencies
        run: npm ci
        working-directory: backend-desktop

      - name: Build backend sidecar binary
        shell: bash
        # CI=false prevents pkg-fetch's progress bar from hitting a CI-environment
        # assertion bug that causes it to crash when building from source.
        env:
          CI: false
        run: |
          mkdir -p src-tauri/binaries
          cd backend-desktop
          npx @yao-pkg/pkg server.js \
            --targets ${{ matrix.pkg-target }} \
            --output dist/sidecar \
            --no-bytecode --public-packages '*' --public
          # pkg appends .exe on windows automatically
          SRC=$(ls dist/sidecar* 2>/dev/null | head -1)
          cp "$SRC" ../src-tauri/binaries/${{ matrix.sidecar-name }}
          chmod +x ../src-tauri/binaries/${{ matrix.sidecar-name }} || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SOSO Baby Mart POS ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          tauriScript: npx @tauri-apps/cli@2
          args: ${{ matrix.rust-target != '' && format('--target {0}', matrix.rust-target) || '' }}
