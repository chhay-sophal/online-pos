name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `SOSO POS ${context.ref.replace('refs/tags/', '')}`,
              body: 'Download the installer for your platform below.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            pkg-target: node20-macos-arm64
            sidecar-name: backend-server-aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            pkg-target: node20-win-x64
            sidecar-name: backend-server-x86_64-pc-windows-msvc.exe
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Install backend-desktop dependencies
        run: npm install
        working-directory: backend-desktop

      - name: Build backend sidecar binary
        shell: bash
        env:
          CI: false
        run: |
          mkdir -p src-tauri/binaries
          cd backend-desktop
          npx @yao-pkg/pkg server.js \
            --targets ${{ matrix.pkg-target }} \
            --output dist/sidecar \
            --no-bytecode --public-packages '*' --public
          SRC=$(ls dist/sidecar* 2>/dev/null | head -1)
          cp "$SRC" ../src-tauri/binaries/${{ matrix.sidecar-name }}
          chmod +x ../src-tauri/binaries/${{ matrix.sidecar-name }} || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npx @tauri-apps/cli@2
          createUpdaterArtifacts: v2Compatible
          args: >-
            --bundles ${{ matrix.platform == 'windows-latest' && 'nsis' || 'dmg' }}
            ${{ matrix.rust-target != '' && format('--target {0}', matrix.rust-target) || '' }}
