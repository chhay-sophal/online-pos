name: Build Desktop App

on:
  push:
    tags:
      - 'v*'           # triggers on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # produces .dmg
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest # produces .exe / .msi
            args: ''
          - platform: ubuntu-22.04   # produces .deb / .AppImage
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend-desktop dependencies
        run: npm ci
        working-directory: backend-desktop

      - name: Build backend sidecar
        run: npm run build
        working-directory: backend-desktop

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SOSO Baby Mart POS ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
